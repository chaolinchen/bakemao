<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BakeMao 主畫面重設計 · 3 個方向</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800;900&family=Noto+Serif+TC:wght@600;700;800;900&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body, #root { margin:0; padding:0; height:100%; background: #EDE4D4; }
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
    * { box-sizing: border-box; }
    button { border: none; background: transparent; cursor: pointer; font-family: inherit; }
    input { font-family: inherit; }
    a { text-decoration: none; cursor: pointer; }
    .phone {
      width: 460px; height: 920px;
      background: #FDF8F2;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 18px 44px rgba(61,41,24,0.15), 0 0 0 8px #3D2918, 0 0 0 10px rgba(61,41,24,0.2);
      position: relative;
    }
    .phone .notch {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 140px; height: 26px; background: #3D2918; border-radius: 0 0 16px 16px;
      z-index: 100;
    }
    .phone-scroll { width:100%; height:100%; overflow: auto; scroll-behavior: smooth; }
    .phone-scroll::-webkit-scrollbar { width: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="option-1-cloud.jsx"></script>
  <script type="text/babel" src="option-2-bubble.jsx"></script>
  <script type="text/babel" src="option-3-notebook.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function Phone({ children }) {
      return (
        <div className="phone">
          <div className="notch" />
          <div className="phone-scroll">{children}</div>
        </div>
      );
    }

    function Intro() {
      return (
        <div style={{
          width: 460, height: 920, padding: 36, background: '#fff',
          borderRadius: 24, border: '1px solid #EFE3D1',
          boxShadow: '0 18px 44px rgba(61,41,24,0.12)',
          fontFamily: 'Noto Serif TC, serif',
          color: '#3D2918',
          display: 'flex', flexDirection:'column', justifyContent:'space-between'
        }}>
          <div>
            <div style={{display:'flex', alignItems:'center', gap:12}}>
              <window.MaoLogo size={56} />
              <div>
                <div style={{fontSize:14, letterSpacing:4, color:'#C8602A', fontWeight:700}}>BAKEMAO</div>
                <div style={{fontSize:28, fontWeight:800, letterSpacing:0.5}}>主畫面重設計</div>
              </div>
            </div>
            <div style={{marginTop: 24, fontFamily:'Noto Sans TC', fontSize:14, lineHeight:1.8, color:'#5C4A3A'}}>
              以 BakeMao 貼紙風 logo（三花貓 + sparkle + 巧克力描邊）為出發，三個方向皆完整覆蓋：
              <br/>① 份數卡 ② 配方卡（含模具／蛋糕類型／打發說明／尺寸／份數／材料列／結果）③ 新增組合 ④ 備料彙總。
              <br/><br/>
              主色 <span style={{fontFamily:'Roboto Mono',background:'#FAF2E6',padding:'1px 6px',borderRadius:4}}>#C8602A</span> 橘、
              描邊 <span style={{fontFamily:'Roboto Mono',background:'#FAF2E6',padding:'1px 6px',borderRadius:4}}>#6B4A2F</span> 巧克力。
            </div>

            <div style={{marginTop: 28, display:'flex', flexDirection:'column', gap:14}}>
              <div style={{padding: 14, background:'#E6EEF5', border:'2px solid #6B4A2F', borderRadius:14, boxShadow:'2px 3px 0 #6B4A2F'}}>
                <div style={{fontSize:15, fontWeight:800, display:'flex', alignItems:'center', gap:8}}>
                  <window.Sparkle size={14} color="#6BA3D6"/>
                  A · 雲朵奶蓋 Cloudy Cream
                </div>
                <div style={{fontFamily:'Noto Sans TC', fontSize:12, color:'#6B5A4A', marginTop:4, lineHeight:1.6}}>
                  貼紙風・天空藍底・奶油白卡＋巧克力描邊。最貼近 logo、最「可愛」的方向。
                </div>
              </div>
              <div style={{padding: 14, background:'#FFE1C7', border:'2px solid #6B4A2F', borderRadius:20, boxShadow:'2px 3px 0 #6B4A2F'}}>
                <div style={{fontSize:15, fontWeight:800, display:'flex', alignItems:'center', gap:8}}>
                  <window.Sparkle size={14} color="#C8602A"/>
                  B · 毛球泡泡 Mao Bubble
                </div>
                <div style={{fontFamily:'Noto Sans TC', fontSize:12, color:'#6B5A4A', marginTop:4, lineHeight:1.6}}>
                  圓滾滾泡泡風、色塊更大、高飽和橘棕，摘要區深色反白；個性最強。
                </div>
              </div>
              <div style={{padding: 14, background:'#FFFBF2', border:'1.5px solid #6B4A2F', borderRadius:6, boxShadow:'3px 3px 0 #6B4A2F'}}>
                <div style={{fontSize:15, fontWeight:800, display:'flex', alignItems:'center', gap:8}}>
                  <window.PawPrint size={14}/>
                  C · 手作筆記 Recipe Note
                </div>
                <div style={{fontFamily:'Noto Sans TC', fontSize:12, color:'#6B5A4A', marginTop:4, lineHeight:1.6}}>
                  食譜筆記本風：米色橫線紙、washi tape、Recipe 戳章、材料成表格。偏 editorial。
                </div>
              </div>
            </div>
          </div>

          <div style={{fontFamily:'Noto Sans TC', fontSize:11.5, color:'#A08875', lineHeight:1.6}}>
            三個方向皆完整重現現有三個畫面段落。可左右拖曳／雙擊任一張進入全螢幕細看。
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas title="BakeMao 主畫面 · 3 個方向">
          <DCSection id="intro" title="Overview">
            <DCArtboard id="intro" label="說明" width={460} height={920}>
              <Intro />
            </DCArtboard>
          </DCSection>
          <DCSection id="options" title="Design Directions">
            <DCArtboard id="opt-a" label="A · 雲朵奶蓋 Cloudy Cream" width={460} height={920}>
              <Phone><window.CloudApp /></Phone>
            </DCArtboard>
            <DCArtboard id="opt-b" label="B · 毛球泡泡 Mao Bubble" width={460} height={920}>
              <Phone><window.BubbleApp /></Phone>
            </DCArtboard>
            <DCArtboard id="opt-c" label="C · 手作筆記 Recipe Note" width={460} height={920}>
              <Phone><window.NotebookApp /></Phone>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
